name: Feature request
description: Suggest an improvement or new template
title: "[Feature]: "
labels:
  - enhancement
body:
  - type: textarea
    id: problem
    attributes:
      label: What problem would this solve?
      description: Explain the user need or workflow gap.
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: Describe the feature, template, integration, or docs change.
    validations:
      required: true
  - type: dropdown
    id: category
    attributes:
      label: Category
      options:
        - n8n workflow template
        - Builder helper
        - Supabase/Edge Function
        - Docker/deployment
        - Documentation
        - Developer experience
        - Other
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Optional. Include links to prior art if helpful.

